name: ${PROJECT_NAME}

services:
  app:
    build:
      context: .
      target: app
      args:
        VITE_API_URL: ${VITE_API_URL}
        DATABASE_URL: ${DATABASE_URL}
        SHADOW_DATABASE_URL: ${SHADOW_DATABASE_URL}
    expose:
      - "3001"
    env_file:
      - .env
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"


